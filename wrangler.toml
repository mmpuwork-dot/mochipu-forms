name = "mochipu-forms"
main = ".open-next/worker.js"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

# Cloudflare Browser Rendering binding — requires Workers Paid plan ($5/mo).
# Used by /report/{kind}/[id]/pdf routes to render the report HTML to PDF.
# IMPORTANT: TOML inline tables MUST come BEFORE any [section] header,
# otherwise they get parsed as a sub-field of the most recent section.
browser = { binding = "BROWSER" }

[observability]
enabled = true
head_sampling_rate = 1

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Plain-text environment variables. Secrets (RESEND_API_KEY,
# GOOGLE_TRANSLATE_API_KEY, SUPABASE_SERVICE_ROLE_KEY) are configured in the
# Cloudflare Worker settings (not committed here) and survive deploys.
[vars]
